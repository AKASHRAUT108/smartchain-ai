version: '3.8'

services:
  api:
    build: .
    container_name: smartchain-api
    ports:
      - "8000:8000"
    volumes:
      - ./models:/app/models
      - ./data:/app/data
    env_file:
      - .env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  dashboard:
    build: .
    container_name: smartchain-dashboard
    ports:
      - "8501:8501"
    volumes:
      - ./models:/app/models
      - ./data:/app/data
    env_file:
      - .env
    depends_on:
      - api
    restart: unless-stopped
    command: streamlit run dashboard/app.py --server.port 8501 --server.address 0.0.0.0